<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaTech Services</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  background: linear-gradient(135deg, #0f172a, #1e1b4b);
  color: white;
}

/* HERO */
.hero {
  text-align: center;
  padding: 80px 20px;
}

.hero h1 {
  font-size: 2.5rem;
  color: #8b5cf6;
}

/* BUTTON */
.btn {
  background: #8b5cf6;
  padding: 10px 20px;
  border-radius: 20px;
  color: white;
  text-decoration: none;
}

/* CHATBOT */
#chatbot {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 300px;
  background: #1e293b;
  border-radius: 10px;
  display: none;
}

#chat-header {
  background: #8b5cf6;
  padding: 10px;
  cursor: pointer;
}

#chat-body {
  padding: 10px;
  height: 200px;
  overflow-y: auto;
}

#chat-input {
  width: 100%;
  padding: 10px;
  border: none;
}
</style>
</head>

<body>

<section class="hero">
  <h1>NovaTech Services</h1>
  <p>Smart Tech. Simple Solutions.</p>
  <br>
  <a class="btn" href="https://wa.me/264812275888">Contact WhatsApp</a>
</section>

<!-- CHATBOT -->
<div id="chatbot">
  <div id="chat-header" onclick="toggleChat()">NovaAI 🤖</div>
  <div id="chat-body"></div>
  <input id="chat-input" placeholder="Type message..." onkeydown="handleChat(event)">
</div>

<button onclick="toggleChat()" style="position:fixed;bottom:20px;right:20px;">💬</button>

<script>

// OPEN/CLOSE CHAT
function toggleChat(){
  const chat = document.getElementById('chatbot');
  chat.style.display = chat.style.display === 'block' ? 'none' : 'block';
}

// 🔥 REAL AI CHAT FUNCTION (FIXED)
async function handleChat(e){
  if(e.key === "Enter"){
    e.preventDefault();

    const input = document.getElementById("chat-input");
    const body = document.getElementById("chat-body");

    const userMsg = input.value.trim();

    if(userMsg === "") return;

    body.innerHTML += `<p><b>You:</b> ${userMsg}</p>`;

    try {
      const res = await fetch("http://localhost:3000/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: userMsg })
      });

      if(!res.ok){
        throw new Error("Server error");
      }

      const data = await res.json();

      body.innerHTML += `<p><b>NovaAI:</b> ${data.reply}</p>`;

    } catch (error) {
      body.innerHTML += `<p><b>NovaAI:</b> ⚠️ Cannot connect to AI server</p>`;
    }

    input.value = "";
    body.scrollTop = body.scrollHeight;
  }
}

</script>

</body>
</html>
