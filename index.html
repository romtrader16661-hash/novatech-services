<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaTech Services</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 50px;
}

button {
  padding: 10px 20px;
  background: #8b5cf6;
  border: none;
  color: white;
  border-radius: 5px;
}

/* CHAT */
#chatbot {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 300px;
  background: #1e293b;
  border-radius: 10px;
  display: none;
}

#chat-header {
  background: #8b5cf6;
  padding: 10px;
  cursor: pointer;
}

#chat-body {
  padding: 10px;
  height: 200px;
  overflow-y: auto;
}

#chat-input {
  width: 100%;
  padding: 10px;
  border: none;
}
</style>
</head>

<body>

<h1>NovaTech Services</h1>
<p>Smart Tech. Simple Solutions.</p>

<button onclick="toggleChat()">💬 Chat with NovaAI</button>

<div id="chatbot">
  <div id="chat-header" onclick="toggleChat()">NovaAI 🤖</div>
  <div id="chat-body"></div>
  <input id="chat-input" placeholder="Type message..." onkeydown="handleChat(event)">
</div>

<script>
function toggleChat(){
  const chat = document.getElementById('chatbot');
  chat.style.display = chat.style.display === 'block' ? 'none' : 'block';
}

async function handleChat(e){
  if(e.key === "Enter"){
    e.preventDefault();

    const input = document.getElementById("chat-input");
    const body = document.getElementById("chat-body");

    const userMsg = input.value.trim();
    if(!userMsg) return;

    body.innerHTML += `<p><b>You:</b> ${userMsg}</p>`;

    try {
      const res = await fetch("http://localhost:3000/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: userMsg })
      });

      const data = await res.json();

      body.innerHTML += `<p><b>NovaAI:</b> ${data.reply}</p>`;

    } catch (err) {
      body.innerHTML += `<p><b>NovaAI:</b> ⚠️ Cannot connect to server</p>`;
    }

    input.value = "";
    body.scrollTop = body.scrollHeight;
  }
}
</script>

</body>
</html>
